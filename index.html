<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <title>MINIBITCOIN ADMIN PANEL</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { 
            --accent: #00ff88; 
            --gold: #ffd700; 
            --bg: #050505; 
            --card: #121212; 
            --border: #222; 
            --red: #ff4444; 
            --muted: #888; 
            --waiting: #ffae00; 
        }
        * { 
            box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent; 
            user-select: none; 
        }
        body { 
            margin: 0; 
            background: var(--bg); 
            color: #fff; 
            font-family: 'Poppins', sans-serif; 
            overflow-x: hidden; 
        }

        header { 
            background: #000; 
            padding: 15px; 
            border-bottom: 2px solid var(--gold); 
            text-align: center; 
            position: sticky; 
            top: 0; 
            z-index: 1000; 
            box-shadow: 0 4px 20px rgba(255, 215, 0, 0.1); 
        }
        .header-title { 
            color: var(--gold); 
            font-weight: 800; 
            font-size: 0.95rem; 
            margin: 0; 
            letter-spacing: 0.5px; 
            text-transform: uppercase; 
        }
        .header-sub { 
            color: var(--accent); 
            font-size: 0.7rem; 
            display: block; 
            margin-top: 2px; 
        }
        .menu-btn { 
            position: absolute; 
            right: 20px; 
            top: 18px; 
            color: var(--gold); 
            font-size: 1.4rem; 
            cursor: pointer; 
        }

        .tabs { 
            display: flex; 
            gap: 8px; 
            margin: 12px; 
            background: #111; 
            border-radius: 12px; 
            border: 1px solid var(--border); 
            padding: 6px; 
            align-items: center; 
            overflow-x: auto; 
        }
        .tab { 
            flex: 1; 
            padding: 10px; 
            border: none; 
            background: none; 
            color: var(--muted); 
            font-weight: 700; 
            font-size: 0.8rem; 
            cursor: pointer; 
            transition: 0.2s; 
            text-align: center; 
            border-radius: 10px; 
            white-space: nowrap; 
        }
        .tab.active { 
            background: var(--accent); 
            color: #000; 
            box-shadow: 0 0 10px var(--accent); 
        }

        #app-content { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(340px, 1fr)); 
            gap: 15px; 
            padding: 10px 12px 90px 12px; 
        }

        .card { 
            background: var(--card); 
            border-radius: 18px; 
            border: 1px solid var(--border); 
            overflow: hidden; 
            position: relative; 
        }
        .card-header { 
            padding: 16px; 
            background: linear-gradient(135deg, #ffd70015, #00ff8815); 
            border-bottom: 1px solid var(--border); 
        }
        .card-body { 
            padding: 16px; 
        }

        .stats-box { 
            display: grid; 
            grid-template-columns: 1fr 1fr 1fr 1fr; 
            gap: 10px; 
            margin-bottom: 20px; 
        }
        .stat-item { 
            background: #0b0b0b; 
            padding: 15px; 
            border-radius: 10px; 
            border: 1px solid #222; 
            text-align: center; 
        }
        .stat-lbl { 
            font-size: 0.6rem; 
            color: #888; 
            text-transform: uppercase; 
            display: block; 
            margin-bottom: 8px; 
            font-weight: 700; 
        }
        .stat-val { 
            font-size: 1.5rem; 
            font-weight: 800; 
        }
        .st-gold { 
            color: var(--gold); 
        }
        .st-green { 
            color: var(--accent); 
        }

        .table-container { 
            overflow-x: auto; 
        }
        table { 
            width: 100%; 
            border-collapse: collapse; 
            font-size: 0.85rem; 
        }
        th { 
            background: #0a0a0a; 
            padding: 12px; 
            text-align: left; 
            border-bottom: 2px solid var(--gold); 
            font-weight: 700; 
            color: var(--gold); 
        }
        td { 
            padding: 12px; 
            border-bottom: 1px solid #222; 
        }
        tr:hover { 
            background: #111; 
        }

        .btn-main { 
            padding: 10px 16px; 
            border-radius: 8px; 
            border: none; 
            font-weight: 700; 
            font-size: 0.85rem; 
            cursor: pointer; 
            transition: 0.2s; 
            text-transform: uppercase; 
            letter-spacing: 0.5px; 
        }
        .btn-approve { 
            background: var(--accent); 
            color: #000; 
        }
        .btn-reject { 
            background: var(--red); 
            color: #fff; 
        }
        .btn-edit { 
            background: var(--gold); 
            color: #000; 
        }
        .btn-view { 
            background: #222; 
            color: #fff; 
        }

        .status-badge { 
            display: inline-block; 
            padding: 4px 12px; 
            border-radius: 20px; 
            font-size: 0.7rem; 
            font-weight: 700; 
            text-transform: uppercase; 
        }
        .status-pending { 
            background: rgba(255, 174, 0, 0.2); 
            color: var(--waiting); 
            border: 1px solid var(--waiting); 
        }
        .status-approved { 
            background: rgba(0, 255, 136, 0.2); 
            color: var(--accent); 
            border: 1px solid var(--accent); 
        }

        #side-menu { 
            position: fixed; 
            top: 0; 
            right: -100%; 
            width: 300px; 
            height: 100%; 
            background: #0a0a0a; 
            z-index: 5000; 
            transition: 0.4s; 
            border-left: 1px solid var(--gold); 
            display: flex; 
            flex-direction: column; 
        }
        #side-menu.active { 
            right: 0; 
        }
        .menu-header { 
            padding: 20px; 
            border-bottom: 1px solid #222; 
            display: flex; 
            align-items: center; 
            gap: 15px; 
            background: #000; 
        }
        .menu-dp { 
            width: 50px; 
            height: 50px; 
            border-radius: 50%; 
            object-fit: cover; 
            border: 2px solid var(--gold); 
        }
        .menu-items { 
            padding: 10px; 
            overflow-y: auto; 
            flex: 1; 
        }
        .menu-link { 
            display: flex; 
            align-items: center; 
            gap: 15px; 
            padding: 16px; 
            color: #ddd; 
            text-decoration: none; 
            border-bottom: 1px solid #1a1a1a; 
            font-weight: 600; 
            font-size: 0.95rem; 
            transition: 0.2s; 
            cursor: pointer; 
        }
        .menu-link:hover { 
            background: #111; 
            color: var(--accent); 
        }
        .menu-link i { 
            width: 25px; 
            text-align: center; 
            color: var(--gold); 
        }
        .close-menu { 
            position: absolute; 
            top: 15px; 
            right: 15px; 
            color: var(--red); 
            font-size: 1.8rem; 
            cursor: pointer; 
        }
        .menu-footer { 
            padding: 20px; 
            border-top: 1px solid #222; 
            text-align: center; 
            background: #000; 
            font-size: 0.7rem; 
            color: #555; 
        }
    </style>
</head>
<body>
    <header>
        <p class="header-title">MINIBITCOIN ADMIN PANEL</p>
        <span class="header-sub">MANAGE PLATFORM & PAYMENTS 🔐</span>
        <div class="menu-btn" onclick="toggleMenu(true)"><i class="fas fa-bars-staggered"></i></div>
    </header>

    <div class="tabs">
        <button class="tab active" onclick="switchTab(event, 'dashboard')">DASHBOARD</button>
        <button class="tab" onclick="switchTab(event, 'payments')">PAYMENTS</button>
        <button class="tab" onclick="switchTab(event, 'users')">USERS</button>
        <button class="tab" onclick="switchTab(event, 'investments')">INVESTMENTS</button>
        <button class="tab" onclick="switchTab(event, 'withdrawals')">WITHDRAWALS</button>
    </div>

    <div id="side-menu">
        <div class="close-menu" onclick="toggleMenu(false)">&times;</div>
        <div class="menu-header">
            <img src="https://img.icons8.com/color/96/user-male-circle.png" class="menu-dp" alt="Admin">
            <div>
                <div style="font-weight:bold; color:#fff;">Admin User</div>
                <div style="font-size:0.7rem; color:var(--accent);">Super Admin</div>
            </div>
        </div>
        <div class="menu-items">
            <a class="menu-link" onclick="switchTab(event, 'dashboard'); toggleMenu(false)"><i class="fas fa-chart-line"></i> Dashboard</a>
            <a class="menu-link" onclick="switchTab(event, 'payments'); toggleMenu(false)"><i class="fas fa-credit-card"></i> Payments</a>
            <a class="menu-link" onclick="switchTab(event, 'users'); toggleMenu(false)"><i class="fas fa-users"></i> Users</a>
            <a class="menu-link" onclick="switchTab(event, 'investments'); toggleMenu(false)"><i class="fas fa-chart-pie"></i> Investments</a>
            <a class="menu-link" onclick="switchTab(event, 'withdrawals'); toggleMenu(false)"><i class="fas fa-money-bill-wave"></i> Withdrawals</a>
        </div>
        <div class="menu-footer">
            <div>Secure Admin Access • Real-time Updates<br>© 2026 MINIBITCOIN</div>
            <button onclick="logout()" style="background:none; border:none; color:var(--red); font-weight:bold; margin-top:10px; cursor:pointer;">LOGOUT</button>
        </div>
    </div>

    <main id="app-content"></main>

    <script>
        function switchTab(e, tab) {
            if (e) e.target.parentElement.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            if (e) e.target.classList.add('active');
            renderContent(tab);
        }

        function toggleMenu(show) {
            const menu = document.getElementById('side-menu');
            if (show) menu.classList.add('active');
            else menu.classList.remove('active');
        }

        function logout() {
            alert('Logged out successfully');
        }

        function renderDashboard() {
            document.getElementById('app-content').innerHTML = `
                <div class="stats-box">
                    <div class="stat-item">
                        <span class="stat-lbl">Total Users</span>
                        <div class="stat-val st-gold">1,245</div>
                    </div>
                    <div class="stat-item">
                        <span class="stat-lbl">Pending Payments</span>
                        <div class="stat-val" style="color:var(--waiting);">23</div>
                    </div>
                    <div class="stat-item">
                        <span class="stat-lbl">Total Balance</span>
                        <div class="stat-val st-gold">₹45,67,890</div>
                    </div>
                    <div class="stat-item">
                        <span class="stat-lbl">Active Investments</span>
                        <div class="stat-val st-green">567</div>
                    </div>
                </div>
                <div class="card">
                    <div class="card-header"><h3 style="margin:0; color:var(--gold);">Recent Transactions</h3></div>
                    <div class="card-body">
                        <div class="table-container">
                            <table>
                                <tr><th>User</th><th>Amount</th><th>Type</th><th>Status</th><th>Date</th></tr>
                                <tr><td>John Doe</td><td>₹500</td><td>Deposit</td><td><span class="status-badge status-approved">Approved</span></td><td>Today</td></tr>
                                <tr><td>Jane Smith</td><td>₹1000</td><td>Withdrawal</td><td><span class="status-badge status-pending">Pending</span></td><td>Today</td></tr>
                            </table>
                        </div>
                    </div>
                </div>
            `;
        }

        function renderPayments() {
            document.getElementById('app-content').innerHTML = `
                <div class="card">
                    <div class="card-header"><h3 style="margin:0; color:var(--gold);">Pending Payment Approvals</h3></div>
                    <div class="card-body">
                        <div class="table-container">
                            <table>
                                <tr><th>User</th><th>Amount</th><th>UTR</th><th>Action</th></tr>
                                <tr><td>User #123</td><td>₹500</td><td>123456789012</td><td><button class="btn-main btn-approve" onclick="alert('✅ Approved!')">Approve</button> <button class="btn-main btn-reject" onclick="alert('❌ Rejected!')">Reject</button></td></tr>
                                <tr><td>User #456</td><td>₹1000</td><td>987654321098</td><td><button class="btn-main btn-approve" onclick="alert('✅ Approved!')">Approve</button> <button class="btn-main btn-reject" onclick="alert('❌ Rejected!')">Reject</button></td></tr>
                            </table>
                        </div>
                    </div>
                </div>
            `;
        }

        function renderUsers() {
            document.getElementById('app-content').innerHTML = `
                <div class="card">
                    <div class="card-header"><h3 style="margin:0; color:var(--gold);">User Management</h3></div>
                    <div class="card-body">
                        <div class="table-container">
                            <table>
                                <tr><th>ID</th><th>Name</th><th>Phone</th><th>Balance</th><th>Action</th></tr>
                                <tr><td>#001</td><td>John Doe</td><td>+91 98765 43210</td><td>₹5,000</td><td><button class="btn-main btn-edit" onclick="alert('Edit user')">Edit</button></td></tr>
                                <tr><td>#002</td><td>Jane Smith</td><td>+91 87654 32109</td><td>₹12,500</td><td><button class="btn-main btn-edit" onclick="alert('Edit user')">Edit</button></td></tr>
                            </table>
                        </div>
                    </div>
                </div>
            `;
        }

        function renderInvestments() {
            document.getElementById('app-content').innerHTML = `
                <div class="card">
                    <div class="card-header"><h3 style="margin:0; color:var(--gold);">Active Investments</h3></div>
                    <div class="card-body">
                        <div class="table-container">
                            <table>
                                <tr><th>User</th><th>Plan</th><th>Amount</th><th>ROI</th><th>Status</th></tr>
                                <tr><td>User #123</td><td>Gold</td><td>₹10,000</td><td>10%</td><td><span class="status-badge status-approved">Active</span></td></tr>
                                <tr><td>User #456</td><td>Platinum</td><td>₹50,000</td><td>15%</td><td><span class="status-badge status-approved">Active</span></td></tr>
                            </table>
                        </div>
                    </div>
                </div>
            `;
        }

        function renderWithdrawals() {
            document.getElementById('app-content').innerHTML = `
                <div class="card">
                    <div class="card-header"><h3 style="margin:0; color:var(--gold);">Withdrawal Requests</h3></div>
                    <div class="card-body">
                        <div class="table-container">
                            <table>
                                <tr><th>User</th><th>Amount</th><th>UPI</th><th>Status</th><th>Action</th></tr>
                                <tr><td>User #123</td><td>₹1,000</td><td>user123@upi</td><td><span class="status-badge status-pending">Pending</span></td><td><button class="btn-main btn-approve" onclick="alert('✅ Processed!')">Process</button></td></tr>
                                <tr><td>User #456</td><td>₹2,500</td><td>user456@upi</td><td><span class="status-badge status-pending">Pending</span></td><td><button class="btn-main btn-approve" onclick="alert('✅ Processed!')">Process</button></td></tr>
                            </table>
                        </div>
                    </div>
                </div>
            `;
        }

        function renderContent(tab) {
            switch(tab) {
                case 'dashboard': renderDashboard(); break;
                case 'payments': renderPayments(); break;
                case 'users': renderUsers(); break;
                case 'investments': renderInvestments(); break;
                case 'withdrawals': renderWithdrawals(); break;
            }
        }

        window.addEventListener('load', () => renderDashboard());
    </script>
</body>
</html>
